services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fund_ei
      POSTGRES_USER: fund_ei
      POSTGRES_PASSWORD: fund_ei_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/migrations/002_rls_pii.sql:/docker-entrypoint-initdb.d/02_rls_pii.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fund_ei -d fund_ei"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://fund_ei:fund_ei_dev@db:5432/fund_ei
      MOCK: "true"
    command: ["python", "scripts/seed_data.py", "--seed"]
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://fund_ei:fund_ei_dev@db:5432/fund_ei
      MOCK: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./documents:/app/documents:ro
      - ./logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
